name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: zip
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller --name "ADBOSS" --windowed --icon assets/icon.icns --add-data "assets:assets" --noconfirm main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --name "ADBOSS" --onefile --add-data "assets:assets" --noconfirm main.py

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --name "ADBOSS" --windowed --onefile --icon assets/icon.png --add-data "assets;assets" --noconfirm main.py

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd dist
          zip -r ../adboss-${{ matrix.platform }}-${{ matrix.arch }}.zip ADBOSS.app

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar czf ../adboss-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ADBOSS

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ADBOSS.exe -DestinationPath adboss-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Generate SHA256
        shell: bash
        run: |
          python -c "
          import hashlib, glob, pathlib
          for f in sorted(glob.glob('adboss-${{ matrix.platform }}-${{ matrix.arch }}.*')):
              if f.endswith('.sha256'): continue
              h = hashlib.sha256(pathlib.Path(f).read_bytes()).hexdigest()
              print(f'{h}  {f}')
          " > adboss-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adboss-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            adboss-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.ext }}
            adboss-${{ matrix.platform }}-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        run: |
          cat > release_body.md << 'HEADER'
          ### Downloads

          | File | SHA256 |
          |------|--------|
          HEADER
          sed -i 's/^          //' release_body.md
          for f in artifacts/adboss-*.sha256; do
            while read hash name; do
              size=$(du -h "artifacts/$name" 2>/dev/null | cut -f1 || echo "?")
              echo "| \`$name\` ($size) | \`$hash\` |" >> release_body.md
            done < "$f"
          done
          cat >> release_body.md << 'FOOTER'

          ### Installation

          - **macOS**: Unzip, move `ADBOSS.app` to `/Applications/`
          - **Linux**: Extract tarball, run `./ADBOSS`
          - **Windows**: Unzip, run `ADBOSS.exe`

          Requires ADB installed and in PATH. See [README](https://github.com/pepperonas/adboss#prerequisites) for details.
          FOOTER
          sed -i 's/^          //' release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ADBOSS ${{ env.TAG_NAME }}"
          body_path: release_body.md
          files: |
            artifacts/adboss-macos-arm64.zip
            artifacts/adboss-linux-x86_64.tar.gz
            artifacts/adboss-windows-x64.zip
