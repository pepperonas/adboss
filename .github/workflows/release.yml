name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: zip
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            ext: zip
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller --name "ADBOSS" --windowed --icon assets/icon.icns --add-data "assets:assets" --noconfirm main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --name "ADBOSS" --onefile --add-data "assets:assets" --noconfirm main.py

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --name "ADBOSS" --windowed --onefile --icon assets/icon.png --add-data "assets;assets" --noconfirm main.py

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd dist
          zip -r ../adboss-${{ matrix.platform }}-${{ matrix.arch }}.zip ADBOSS.app

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar czf ../adboss-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ADBOSS

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ADBOSS.exe -DestinationPath adboss-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Generate SHA256
        shell: bash
        run: |
          python -c "
          import hashlib, glob, pathlib
          for f in sorted(glob.glob('adboss-${{ matrix.platform }}-${{ matrix.arch }}.*')):
              if f.endswith('.sha256'): continue
              h = hashlib.sha256(pathlib.Path(f).read_bytes()).hexdigest()
              print(f'{h}  {f}')
          " > adboss-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adboss-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            adboss-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.ext }}
            adboss-${{ matrix.platform }}-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        run: |
          python3 << 'PYSCRIPT'
          import glob, os

          lines = ["### Downloads", "", "| File | SHA256 |", "|------|--------|"]

          for sha_file in sorted(glob.glob("artifacts/adboss-*.sha256")):
              with open(sha_file) as f:
                  for raw_line in f:
                      line = raw_line.strip()
                      if not line:
                          continue
                      parts = line.split(None, 1)
                      if len(parts) != 2:
                          continue
                      sha256, name = parts
                      name = name.strip()
                      artifact_path = os.path.join("artifacts", os.path.basename(name))
                      try:
                          size_bytes = os.path.getsize(artifact_path)
                          if size_bytes >= 1_000_000_000:
                              size_str = f"{size_bytes / (1024**3):.1f} GB"
                          elif size_bytes >= 1_000_000:
                              size_str = f"{size_bytes / (1024**2):.1f} MB"
                          else:
                              size_str = f"{size_bytes / 1024:.0f} KB"
                      except OSError:
                          size_str = "?"
                      lines.append(f"| `{os.path.basename(name)}` ({size_str}) | `{sha256}` |")

          lines.extend([
              "",
              "### Installation",
              "",
              "- **macOS (Apple Silicon)**: Download `adboss-macos-arm64.zip`, unzip, move `ADBOSS.app` to `/Applications/`",
              "- **macOS (Intel)**: Download `adboss-macos-x86_64.zip`, unzip, move `ADBOSS.app` to `/Applications/`",
              "- **Linux**: Extract tarball, run `./ADBOSS`",
              "- **Windows**: Unzip, run `ADBOSS.exe`",
              "",
              "Requires ADB installed and in PATH. See [README](https://github.com/pepperonas/adboss#prerequisites) for details.",
          ])

          with open("release_body.md", "w") as f:
              f.write("\n".join(lines) + "\n")
          PYSCRIPT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ADBOSS ${{ env.TAG_NAME }}"
          body_path: release_body.md
          files: |
            artifacts/adboss-macos-arm64.zip
            artifacts/adboss-macos-x86_64.zip
            artifacts/adboss-linux-x86_64.tar.gz
            artifacts/adboss-windows-x64.zip
